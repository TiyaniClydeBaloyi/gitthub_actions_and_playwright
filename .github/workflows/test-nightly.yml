name: Nightly Playwright test

on:
  schedule:
    - cron: "40 14 * * *"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Build and test with maven
        run: mvn -B clean test -Dbrowser=Chrome -Durl=https://playwright.dev/
